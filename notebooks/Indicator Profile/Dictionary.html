<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indicator Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Include navigation dynamically -->
  <div id="navigation"></div>
  <script>
    fetch('./navigation.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navigation').innerHTML = data;
      })
      .catch(error => console.error('Error loading navigation:', error));
  </script>

  <div class="container">
    <h2>Indicator Dictionary</h2>
    <div id="indicator-list">
      <!-- Indicator data will be dynamically loaded here -->
    </div>
  </div>

  <script>
    fetch('Indicator_Dictionary.json')
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById('indicator-list');
        Object.keys(data).forEach(indicator => {
          const div = document.createElement('div');
          div.className = 'indicator';
          div.innerHTML = `
            <h3>Indicator: ${indicator}</h3>
            <p>${JSON.stringify(data[indicator], null, 2)}</p>
          `;
          container.appendChild(div);
        });
      })
      .catch(error => {
        console.error('Error loading indicator dictionary:', error);
        document.getElementById('indicator-list').innerHTML = '<p class="error">Failed to load indicator dictionary.</p>';
      });
  </script>
</body>
</html>
