<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Navigation</title>
  <style>
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 250px;
      background: linear-gradient(135deg, #0078d4, #0053a6);
      color: #fff;
      padding: 20px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
      animation: fadeInSidebar 1s ease-in-out;
      z-index: 1;
    }
    .sidebar h3 {
      margin-top: 0;
      font-size: 1.8em;
      color: #fff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 20px 0;
    }
    .sidebar ul li {
      margin-bottom: 10px;
    }
    .sidebar ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 1.2em;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }
    .sidebar ul li a:hover {
      color: #f4f6fa;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>Menu</h3>
    <ul>
      <li><a href="./Profile_UI.html">Home</a></li>
      <li><a href="./Dictionary.html">Dictionary</a></li>
    </ul>
  </div>
</body>
</html>
