<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indicator Profile UI</title>
  <!-- Link external styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <!-- Server-side include of navigation -->
  <div id="navigation">
    {% include 'navigation.html' %}
  </div>

  <div class="container">
    <h2>Indicator Profile Beta</h2>

    <label class="dropdown-label" for="partner-select">Filter by Partner:</label>
    <select id="partner-select" class="search-bar">
      <option value="">All Partners</option>
    </select>

    <label class="dropdown-label" for="search-bar">Search indicators:</label>
    <input type="text" id="search-bar" class="search-bar" placeholder="Type to filter…" list="indicator-list">
    <datalist id="indicator-list"></datalist>

    <label class="dropdown-label" for="date-filter">Filter by Date:</label>
    <input type="date" id="date-filter" class="date-filter">

    <div id="indicator-details" class="indicator-details"></div>
  </div>

  <script>
    // Initialize state
    let indicators = [];
    let groupedByNumber = {};

    function formatDate(fdInt) {
      const s = fdInt.toString().padStart(8, '0');
      return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    }

    // Fetch data from static JSON file
    fetch('{{ url_for("static", filename="Indicator_Dictionary.json") }}')
      .then(res => {
        if (!res.ok) throw new Error(res.statusText);
        return res.json();
      })
      .then(data => {
        // Prepare indicators array
        indicators = Object.values(data).flatMap(arr => arr.map(e => ({
          number: e.Indicator,
          partner: e.Partner || 'Unknown Partner',
          fileDate: e.FileDate,
          description: `
            Indicator: ${e.Indicator}<br>
            Frequency Last 7 Days: ${e['Frequency (7d)']}<br>
            Frequency Last 30 Days: ${e['Frequency (30d)']}<br>
            Probability (7d): ${e['Probability: 7-Day']}<br>
            Probability (14d): ${e['Probability: 14-Day']}<br>
            Probability (30d): ${e['Probability: 30-Day']}<br>
          `
        })));

        // Group by indicator number
        groupedByNumber = indicators.reduce((acc, i) => {
          (acc[i.number] = acc[i.number] || []).push(i);
          return acc;
        }, {});
        Object.values(groupedByNumber).forEach(arr =>
          arr.sort((a, b) => b.fileDate - a.fileDate)
        );

        populatePartners();
        applyFilters();
      })
      .catch(err => {
        console.error(err);
        document.getElementById('indicator-details').innerHTML =
          '<p class="error">Failed to load indicators.</p>';
      });

    const partnerSelect = document.getElementById('partner-select');
    const searchBar = document.getElementById('search-bar');
    const dateFilter = document.getElementById('date-filter');
    const datalist = document.getElementById('indicator-list');
    const detailsDiv = document.getElementById('indicator-details');

    // Set default date
    dateFilter.value = new Date().toISOString().split('T')[0];

    function populatePartners() {
      const partners = [...new Set(indicators.map(i => i.partner))].sort();
      partners.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        partnerSelect.appendChild(opt);
      });
    }

    function renderDatalist(nums) {
      datalist.innerHTML = '';
      nums.sort().forEach(n => {
        const opt = document.createElement('option');
        opt.value = n;
        datalist.appendChild(opt);
      });
    }

    function applyFilters() {
      const p = partnerSelect.value;
      const q = searchBar.value.trim().toLowerCase();
      const d = dateFilter.value;
      const queryList = q.split(',').map(s => s.trim());

      const filtered = indicators.filter(i => {
        const matchP = !p || i.partner === p;
        const matchD = !d || formatDate(i.fileDate) === d;
        const matchQ = !q || queryList.some(t => (
          `${i.number} ${i.partner}`.toLowerCase().includes(t)
        ));
        return matchP && matchD && matchQ;
      });

      detailsDiv.innerHTML = '';
      if (!filtered.length) {
        detailsDiv.innerHTML = '<p class="error">No data available for selected filters.</p>';
        return;
      }

      // Update datalist
      renderDatalist([...new Set(filtered.map(i => i.number))]);

      // Render entries
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `<h3 class="indicator-title">${item.partner}</h3>
                         <p class="indicator-description">${item.description}</p>`;
        detailsDiv.appendChild(div);
      });
    }

    function renderDetails(num) {
      detailsDiv.innerHTML = '';
      if (!groupedByNumber[num]) return;
      const p = partnerSelect.value;
      const d = dateFilter.value;

      groupedByNumber[num]
        .filter(i => (!p || i.partner === p) && (!d || formatDate(i.fileDate) === d))
        .forEach(item => {
          const div = document.createElement('div');
          div.className = 'entry';
          div.innerHTML = `<h3 class="indicator-title">${item.partner}</h3>
                           <p class="indicator-description">${item.description}</p>`;
          detailsDiv.appendChild(div);
        });

      if (!detailsDiv.innerHTML.trim()) {
        detailsDiv.innerHTML = '<p class="error">No data available for the selected indicator and date.</p>';
      }
    }

    function validateInputs() {
      const errs = [];
      if (!dateFilter.value) errs.push('Date filter is required.');
      if (!searchBar.value.trim()) errs.push('Search bar cannot be empty.');
      if (errs.length) { alert(errs.join('\n')); return false; }
      return true;
    }

    // Event listeners
    partnerSelect.addEventListener('change', applyFilters);
    dateFilter.addEventListener('change', () => { if (validateInputs()) applyFilters(); });
    searchBar.addEventListener('input', applyFilters);
    searchBar.addEventListener('change', () => renderDetails(searchBar.value.trim()));
    searchBar.addEventListener('keypress', e => { if (e.key === 'Enter' && validateInputs()) applyFilters(); });
  </script>
</body>
</html>
